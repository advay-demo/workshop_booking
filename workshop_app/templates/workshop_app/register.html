{% extends 'workshop_app/base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<style>
	label.required::after {
		content: "*";
		color: red;
	}

	.errorlist {
		color: red;
		font-size: 13px;
		margin-top: 4px;
	}

	.form-wrapper {
		min-height: 100vh;
		display: flex;
		justify-content: center;
		align-items: center;
		background: linear-gradient(135deg, #e9ecf7, #cfd6f6);
		padding: 40px 20px;
	}

	.form-card {
		background: #ffffff;
		padding: 35px 40px;
		border-radius: 18px;
		box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
		width: 100%;
		max-width: 750px;
	}

	.form-title {
		font-size: 24px;
		font-weight: 600;
		text-align: center;
		margin-bottom: 25px;
	}

	.form-group {
		margin-bottom: 18px;
	}

	.form-group label {
		font-weight: 500;
		margin-bottom: 6px;
		display: block;
		color: #444;
	}

	.form-group input,
	.form-group select {
		width: 100%;
		padding: 12px;
		border-radius: 10px;
		border: 1px solid #e2e8f0;
		background: #f8fafc;
		transition: 0.2s;
	}

	.form-group input:focus,
	.form-group select:focus {
		border-color: #6366f1;
		outline: none;
		background: #fff;
		box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
	}

	.btn-submit {
		width: 100%;
		padding: 14px;
		border-radius: 12px;
		border: none;
		background: linear-gradient(135deg, #6366f1, #8b5cf6);
		color: white;
		font-size: 16px;
		font-weight: 600;
		margin-top: 10px;
		transition: 0.25s;
	}

	.btn-submit:hover {
		transform: translateY(-2px);
		box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
	}
</style>

<div class="form-wrapper">
	<div class="form-card">

		<div class="form-title">Coordinator Registration</div>

		<form method="post">
			{% csrf_token %}

			{% for field in form %}
			<div class="form-group">
				<label class="{% if field.field.required %}required{% endif %}">
					{{ field.label }}
				</label>

				{{ field }}

				{% if field.help_text %}
				<small style="color:#666;">{{ field.help_text }}</small>
				{% endif %}

				{{ field.errors }}
			</div>
			{% endfor %}

			<button class="btn-submit" type="submit">
				Register
			</button>
		</form>

	</div>
</div>

{% endblock %}
