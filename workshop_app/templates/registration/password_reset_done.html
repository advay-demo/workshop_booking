{% extends "workshop_app/base.html" %}
{% block title %} Password Reset Successful {% endblock %}

{% block content %}

<style>
    .reset-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
    }

    .reset-card {
        background: #ffffff;
        padding: 45px 50px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 520px;
        width: 100%;
        animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .success-icon {
        width: 70px;
        height: 70px;
        margin: 0 auto 20px;
        background: #e6f4ea;
        color: #28a745;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: bold;
    }

    .title {
        font-size: 28px;
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 12px;
    }

    .message {
        background: #f0fdf4;
        color: #166534;
        padding: 14px;
        border-radius: 10px;
        font-size: 15px;
        margin-bottom: 30px;
    }

    .btn-login {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        /* purple gradient */
        color: white;
        padding: 12px 32px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: all 0.25s ease;
    }

    .btn-login:hover {
        background: linear-gradient(135deg, #5b5cf0, #7c3aed);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
    }
</style>

<div class="reset-wrapper">
    <div class="reset-card">

        <div class="success-icon">✓</div>

        <div class="title">
            Password Reset Successful
        </div>

        <div class="message">
            Instructions to set a new password have been sent to your registered email address.
        </div>

        <a href="{% url 'login' %}" class="btn-login">
            Go to Login
        </a>

    </div>
</div>

{% endblock %}
